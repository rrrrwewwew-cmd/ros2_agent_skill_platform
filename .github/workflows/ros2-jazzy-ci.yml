name: ROS 2 Jazzy CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ros2-jazzy-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test ROS 2 packages
    runs-on: ubuntu-latest
    container:
      image: rostooling/setup-ros-docker:ubuntu-noble-latest
    steps:
      - name: Build and test the workspace
        uses: ros-tooling/action-ros-ci@v0.4
        with:
          package-name: safe_agent_core
          target-ros2-distro: jazzy
          import-token: ${{ secrets.GITHUB_TOKEN }}
