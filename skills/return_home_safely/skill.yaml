schema_version: 1
name: return_home_safely
version: 0.1.0
description: Check robot and water-puddle evidence, preview a Keepout-safe path, and execute one approved return-to-home Nav2 goal.
entrypoint: robot_composite_skills.workflows:return_home_safely
safety_level: controlled
requires_human_approval: true
timeout_sec: 180.0
cancel_supported: true
idempotent: false
inputs:
  goal_x: {type: number, minimum: -20.0, maximum: 20.0}
  goal_y: {type: number, minimum: -20.0, maximum: 20.0}
  goal_yaw_deg: {type: number, minimum: -180.0, maximum: 180.0}
  keepout_profile: {type: string, enum: [rbot_water_puddle_v2]}
preconditions:
  - exact_execution_approval_fresh
  - nav2_active
  - tf_fresh
  - semantic_water_puddle_map_verified
  - semantic_keepout_monitor_ok
effects:
  - may_move_robot_after_fresh_safe_route
  - may_cancel_nav2_goal
ros_permissions:
  topics_read:
    - /diagnostics
    - /semantic_keepout/safety_ok
    - /tf
    - /tf_static
    - /odom
    - /scan
  topics_write: []
  services:
    - /lifecycle_manager_navigation/is_active
    - /global_costmap/get_costmap
    - /navigate_to_pose/_action/cancel_goal
  actions:
    - /compute_path_to_pose
    - /navigate_to_pose
