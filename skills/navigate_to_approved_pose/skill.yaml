schema_version: 1
name: navigate_to_approved_pose
version: 0.1.0
description: Execute one exact human-approved Nav2 pose goal after fresh health and semantic route revalidation.
entrypoint: robot_controlled_navigation_skills.navigation:navigate_to_approved_pose
safety_level: controlled
requires_human_approval: true
timeout_sec: 120.0
cancel_supported: true
idempotent: false
inputs:
  goal_x:
    type: number
    minimum: -20.0
    maximum: 20.0
  goal_y:
    type: number
    minimum: -20.0
    maximum: 20.0
  goal_yaw_deg:
    type: number
    minimum: -180.0
    maximum: 180.0
  keepout_profile:
    type: string
    enum:
      - rbot_water_puddle_v2
  approved_path_sha256:
    type: string
    pattern: ^[0-9a-f]{64}$
  approved_semantic_map_sha256:
    type: string
    pattern: ^[0-9a-f]{64}$
preconditions:
  - exact_execution_approval_fresh
  - nav2_active
  - tf_fresh
  - safety_monitor_ok
  - required_lidar_fresh
  - fresh_route_matches_approved_preview
  - semantic_keepout_active
effects:
  - may_move_robot
  - may_cancel_nav2_goal
ros_permissions:
  topics_read:
    - /diagnostics
    - /semantic_keepout/safety_ok
    - /tf
    - /tf_static
    - /odom
    - /scan
  topics_write: []
  services:
    - /lifecycle_manager_navigation/is_active
    - /global_costmap/get_costmap
    - /navigate_to_pose/_action/cancel_goal
  actions:
    - /compute_path_to_pose
    - /navigate_to_pose
