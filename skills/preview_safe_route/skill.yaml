schema_version: 1
name: preview_safe_route
version: 0.1.0
description: Preview one Nav2 map path and verify it against an active semantic Keepout zone without moving the robot.
entrypoint: robot_navigation_skills.preview:preview_safe_route
safety_level: read_only
requires_human_approval: false
timeout_sec: 8.0
cancel_supported: true
idempotent: false
inputs:
  goal_x:
    type: number
    minimum: -20.0
    maximum: 20.0
  goal_y:
    type: number
    minimum: -20.0
    maximum: 20.0
  goal_yaw_deg:
    type: number
    minimum: -180.0
    maximum: 180.0
  keepout_profile:
    type: string
    enum:
      - rbot_water_puddle_v2
preconditions: []
effects:
  - reads_nav2_global_plan
  - reads_global_costmap
  - reads_persistent_semantic_map
ros_permissions:
  topics_read: []
  topics_write: []
  services:
    - /global_costmap/get_costmap
  actions:
    - /compute_path_to_pose
