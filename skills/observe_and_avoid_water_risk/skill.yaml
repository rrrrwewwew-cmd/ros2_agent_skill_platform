schema_version: 1
name: observe_and_avoid_water_risk
version: 0.1.0
description: Observe a grounded water-puddle risk, refresh semantic Keepout evidence, preview a safe route, and execute one approved Nav2 goal.
entrypoint: robot_composite_skills.workflows:observe_and_avoid_water_risk
safety_level: controlled
requires_human_approval: true
timeout_sec: 300.0
cancel_supported: true
idempotent: false
inputs:
  goal_x: {type: number, minimum: -20.0, maximum: 20.0}
  goal_y: {type: number, minimum: -20.0, maximum: 20.0}
  goal_yaw_deg: {type: number, minimum: -180.0, maximum: 180.0}
  keepout_profile: {type: string, enum: [rbot_water_puddle_v2]}
preconditions:
  - exact_execution_approval_fresh
  - nav2_active
  - synchronized_rgbd_fresh
  - tf_fresh
  - semantic_keepout_monitor_ok
effects:
  - may_update_semantic_water_puddle_map
  - may_move_robot_after_fresh_safe_route
  - may_cancel_nav2_goal
ros_permissions:
  topics_read:
    - /camera/camera_info
    - /camera/depth_image
    - /camera/image
    - /diagnostics
    - /odom
    - /scan
    - /semantic_keepout/safety_ok
    - /tf
    - /tf_static
  topics_write: []
  services:
    - /lifecycle_manager_navigation/is_active
    - /global_costmap/get_costmap
    - /navigate_to_pose/_action/cancel_goal
  actions:
    - /compute_path_to_pose
    - /navigate_to_pose
